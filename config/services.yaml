# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    google_recaptcha_site_key: '%env(GOOGLE_RECAPTCHA_SITE_KEY)%'
    mailer_from_email: '%env(MAILER_FROM_EMAIL)%'
    mailer_from_name: '%env(MAILER_FROM_NAME)%'
    face_api_base_url: '%env(FACE_API_BASE_URL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # CloudinaryService MUST be defined BEFORE FileUploadService
    App\Service\CloudinaryService:
        arguments:
            $cloudName: '%env(CLOUDINARY_CLOUD_NAME)%'
            $apiKey: '%env(CLOUDINARY_API_KEY)%'
            $apiSecret: '%env(CLOUDINARY_API_SECRET)%'

    # Configuration du service FileUploadService
    App\Service\FileUploadService:
        arguments:
            $projectRoot: '%kernel.project_dir%'
            $cloudinary: '@App\Service\CloudinaryService'

    App\Service\AiService:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'
            $langblyApiKey: '%env(LANGBLY_API_KEY)%'

    App\Service\WhisperService:
        arguments:
            $openaiApiKey: '%env(OPENAI_API_KEY)%'

    App\Service\SpeechToSpeechService:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'
            $projectDir: '%kernel.project_dir%'

    App\Service\AdminEmailService:
        arguments:
            $brevoApiKey: '%env(BREVO_API_KEY)%'
            $fromEmail: '%env(BREVO_FROM_EMAIL)%'
            $fromName: '%env(BREVO_FROM_NAME)%'

    App\Service\UserRelationService:
        arguments:
            $brevoApiKey: '%env(BREVO_API_KEY)%'
            $fromEmail: '%env(BREVO_FROM_EMAIL)%'
            $fromName: '%env(BREVO_FROM_NAME)%'

    App\Service\FaceApiClient:
        arguments:
            $baseUrl: '%env(resolve:FACE_API_BASE_URL)%'

    App\Service\NotificationService:
        arguments:
            $vapidPublicKey: '%env(VAPID_PUBLIC_KEY)%'
            $vapidPrivateKey: '%env(VAPID_PRIVATE_KEY)%'
            $vapidSubject: '%env(VAPID_SUBJECT)%'
            $projectDir: '%kernel.project_dir%'

    App\Service\AlertService:
        arguments:
            $notif: '@App\Service\NotificationService'

    App\Service\AIRecommendationService:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
